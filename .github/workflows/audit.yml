name: Provenance Audit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_gee_audit:
        description: "Run full GEE asset audit (requires GEE_SERVICE_ACCOUNT_KEY secret)"
        required: false
        default: "false"

# CI runs --no-gee mode that validates allowlist JSON + logs/runs.jsonl entry schema.
# Full GEE-asset audit requires authentication credentials (escalation per P-01.0c
# DevPrompt: "if auth setup needs manual configuration — escalate, не assume").
#
# To enable full GEE audit:
#   1. Create GEE service account with read access на RuPlumeScan/baselines/* and
#      RuPlumeScan/catalog/*.
#   2. Add JSON key file as GitHub secret named GEE_SERVICE_ACCOUNT_KEY.
#   3. Trigger workflow_dispatch с `full_gee_audit=true` OR change condition below.
#
# Until then, full audit is run locally:
#   python tools/audit_provenance_consistency.py
jobs:
  schema-audit:
    name: Schema audit (no GEE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run no-gee audit
        run: python tools/audit_provenance_consistency.py --no-gee

  gee-audit:
    name: Full GEE audit (manual dispatch only)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.full_gee_audit == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: src/py
        run: pip install -r requirements-dev.txt

      - name: Auth GEE
        env:
          GEE_SERVICE_ACCOUNT_KEY: ${{ secrets.GEE_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$GEE_SERVICE_ACCOUNT_KEY" ]; then
            echo "ERROR: GEE_SERVICE_ACCOUNT_KEY secret not configured."
            exit 1
          fi
          # Write secret к file via Python — avoids ALL shell interpretation
          # (echo backslash escapes, printf format conversions etc).
          # Then auto-wrap if user pasted partial JSON (без outer { ... }).
          python <<'PY'
          import os, json, sys
          raw = os.environ['GEE_SERVICE_ACCOUNT_KEY']
          stripped = raw.strip()
          # Auto-wrap defensive — if missing outer {}, add them
          if not stripped.startswith('{'):
              stripped = '{' + stripped
          if not stripped.endswith('}'):
              stripped = stripped + '}'
          # Validate parseable
          try:
              data = json.loads(stripped)
          except json.JSONDecodeError as e:
              print(f'ERROR: secret не valid JSON even after wrap: {e}')
              # Print structure hints (no values, no keys — just shape)
              print(f'  raw length: {len(raw)} chars')
              print(f'  starts с: {repr(raw[:30])}')
              print(f'  ends с:   {repr(raw[-30:])}')
              sys.exit(1)
          # Verify required fields для service account
          required = ['type', 'project_id', 'private_key', 'client_email']
          missing = [f for f in required if f not in data]
          if missing:
              print(f'ERROR: service account JSON missing fields: {missing}')
              sys.exit(1)
          with open('/tmp/gee-key.json', 'w') as f:
              json.dump(data, f)
          print(f'OK: service account JSON valid, client_email={data["client_email"]}')
          PY
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gee-key.json" >> $GITHUB_ENV

      - name: Run full audit
        run: python tools/audit_provenance_consistency.py
