name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff black

      - name: ruff check
        working-directory: src/py
        run: ruff check .

      - name: black --check
        working-directory: src/py
        run: black --check .
